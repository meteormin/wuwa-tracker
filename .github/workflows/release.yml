name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/go-test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: webui/yarn.lock

      - name: Enable Yarn
        run: corepack enable

      - name: Create version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y.%m.%d')"
          VERSION="${BUILD_DATE}-${SHORT_SHA}"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "commit_hash=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          make build \
            BUILD_DATE="${{ steps.version.outputs.build_date }}" \
            COMMIT_HASH="${{ steps.version.outputs.commit_hash }}"

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="wuwa-tracker-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${TARGET}"
          cp README.md "dist/${TARGET}/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv bin/wuwa-tracker "dist/${TARGET}/wuwa-tracker.exe"
            mv bin/wuwa-tracker-server "dist/${TARGET}/wuwa-tracker-server.exe"
            cd dist
            zip -r "${TARGET}.zip" "${TARGET}"
          else
            mv bin/wuwa-tracker "dist/${TARGET}/wuwa-tracker"
            mv bin/wuwa-tracker-server "dist/${TARGET}/wuwa-tracker-server"
            cd dist
            tar -czf "${TARGET}.tar.gz" "${TARGET}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuwa-tracker-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="$(date -u +'%Y.%m.%d')-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists."
          else
            git tag "${{ steps.version.outputs.version }}"
            git push origin "${{ steps.version.outputs.version }}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
