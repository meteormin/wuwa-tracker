name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/rust-test.yml

  build:
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            archive_ext: tar.gz
          - os: darwin
            arch: amd64
            runner: macos-13
            archive_ext: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            archive_ext: tar.gz
          - os: windows
            arch: amd64
            runner: windows-latest
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install make on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: choco install make -y

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: webui/yarn.lock

      - name: Enable Yarn
        run: corepack enable

      - name: Create version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y.%m.%d')"
          VERSION="${BUILD_DATE}-${SHORT_SHA}"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "commit_hash=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: make release

      - name: Package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="wuwa-tracker-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/${TARGET}"
          cp README.md "dist/${TARGET}/"

          if [ "${{ matrix.os }}" = "windows" ]; then
            cp target/release/wuwa-tracker.exe "dist/${TARGET}/wuwa-tracker.exe"
            cd dist
            zip -r "${TARGET}.zip" "${TARGET}"
          else
            cp target/release/wuwa-tracker "dist/${TARGET}/wuwa-tracker"
            cd dist
            tar -czf "${TARGET}.tar.gz" "${TARGET}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuwa-tracker-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="$(date -u +'%Y.%m.%d')-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists."
          else
            git tag "${{ steps.version.outputs.version }}"
            git push origin "${{ steps.version.outputs.version }}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
