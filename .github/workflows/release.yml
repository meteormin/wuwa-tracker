name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/rust-test.yml

  build:
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            archive_ext: tar.gz
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            archive_ext: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            archive_ext: tar.gz
          - os: windows
            arch: amd64
            runner: windows-latest
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install make on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: choco install make -y

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: webui/yarn.lock

      - name: Enable Yarn
        run: corepack enable

      - name: Create version
        id: version
        shell: bash
        run: |
          VERSION="$(cargo pkgid -p wuwa-tracker | sed 's/.*#//; s/.*@//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo version ${{ steps.version.outputs.version }}."
            exit 1
          fi

      - name: Build
        shell: bash
        run: make release

      - name: Package Unix
        if: matrix.os != 'windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          TARGET="wuwa-tracker-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/${TARGET}"
          cp README.md "dist/${TARGET}/"
          cp target/release/wuwa-tracker "dist/${TARGET}/wuwa-tracker"
          tar -czf "dist/${TARGET}.tar.gz" -C dist "${TARGET}"

      - name: Package Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.tag }}"
          $Target = "wuwa-tracker-$Version-${{ matrix.os }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "dist/$Target" | Out-Null
          Copy-Item README.md "dist/$Target/"
          Copy-Item target/release/wuwa-tracker.exe "dist/$Target/wuwa-tracker.exe"
          Compress-Archive -Path "dist/$Target" -DestinationPath "dist/$Target.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuwa-tracker-${{ steps.version.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create version
        id: version
        shell: bash
        run: |
          VERSION="$(cargo pkgid -p wuwa-tracker | sed 's/.*#//; s/.*@//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo version ${{ steps.version.outputs.version }}."
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
